<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>旅遊計畫</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/sortablejs@1.15.2/Sortable.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── HEADER ───────────────────────────────────────────────────────────── -->
<header id="app-header">
  <h1>⛩️ 旅遊計畫</h1>
  <select id="trip-selector">
    <option value="">— 載入旅程中 —</option>
  </select>
</header>

<!-- ── MAIN ─────────────────────────────────────────────────────────────── -->
<main id="main">

  <!-- ITINERARY VIEW -->
  <section id="view-itinerary" class="view active">
    <div id="itinerary-content"><div class="spinner"></div></div>
  </section>

  <!-- EXPENSES VIEW -->
  <section id="view-expenses" class="view">
    <div id="expenses-content"><div class="spinner"></div></div>
  </section>

  <!-- CHECKLIST VIEW -->
  <section id="view-checklist" class="view">
    <div id="checklist-content"><div class="spinner"></div></div>
  </section>

  <!-- MAP VIEW -->
  <section id="view-map" class="view">
    <div id="map-container">
      <div class="map-loading"><div class="spinner"></div><span>載入地圖中...</span></div>
    </div>
  </section>

  <!-- TRIPS VIEW -->
  <section id="view-trips" class="view">
    <div id="trips-content"><div class="spinner"></div></div>
  </section>

</main>

<!-- ── FAB ──────────────────────────────────────────────────────────────── -->
<div id="fab">＋</div>

<!-- ── BOTTOM NAV ───────────────────────────────────────────────────────── -->
<nav id="bottom-nav">
  <button class="nav-btn active" data-view="itinerary">
    <span class="nav-icon">🗺️</span>行程
  </button>
  <button class="nav-btn" data-view="expenses">
    <span class="nav-icon">💴</span>費用
  </button>
  <button class="nav-btn" data-view="checklist">
    <span class="nav-icon">✅</span>清單
  </button>
  <button class="nav-btn" data-view="map">
    <span class="nav-icon">🗾</span>地圖
  </button>
  <button class="nav-btn" data-view="trips">
    <span class="nav-icon">🧳</span>旅程
  </button>
</nav>

<!-- ── ITINERARY MODAL ──────────────────────────────────────────────────── -->
<div class="offcanvas offcanvas-bottom" id="modal" tabindex="-1" style="border-radius:22px 22px 0 0;max-height:92vh;">
  <div class="modal-handle"></div>
  <div class="offcanvas-header border-bottom pb-3">
    <span class="fw-bold fs-6" id="modal-title">新增行程</span>
    <button type="button" class="btn-close" id="modal-close-btn" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
      <input type="hidden" id="edit-item-id" />
      <div class="mb-3">
        <label class="form-label small fw-semibold">景點名稱 *</label>
        <input class="form-control" id="f-name" type="text" placeholder="🔍 搜尋景點名稱..." autocomplete="off" />
      </div>
      <div class="row g-2">
        <div class="col mb-3">
          <label class="form-label small fw-semibold">日期</label>
          <input class="form-control" id="f-date" type="date" />
        </div>
        <div class="col mb-3">
          <label class="form-label small fw-semibold">時間</label>
          <input class="form-control" id="f-time" type="text" placeholder="09:00" />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">類型</label>
        <select class="form-select" id="f-type">
          <option value="">— 選擇 —</option>
          <option>🏛️ 景點</option>
          <option>🍽️ 餐廳</option>
          <option>🚉 交通</option>
          <option>🏨 住宿</option>
          <option>🛍️ 購物</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">地址</label>
        <input class="form-control" id="f-address" type="text" placeholder="地址" />
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Google Maps 連結</label>
        <input class="form-control" id="f-maps" type="url" placeholder="https://maps.google.com/..." />
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">預估費用（JPY）</label>
        <input class="form-control" id="f-cost" type="number" placeholder="0" />
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">備註</label>
        <textarea class="form-control" id="f-notes" placeholder="備註..." rows="3"></textarea>
      </div>
      <div class="mb-3" id="f-done-row" style="display:none;">
        <label class="d-flex align-items-center gap-2" style="cursor:pointer;font-size:14px;">
          <input type="checkbox" id="f-done" style="width:18px;height:18px;accent-color:var(--purple1);" />
          已完成
        </label>
      </div>
      <div class="modal-footer-row" id="modal-btn-row">
        <button class="btn btn-danger" id="modal-save-btn">儲存</button>
      </div>
  </div>
</div>

<!-- ── TRIP MODAL ───────────────────────────────────────────────────────── -->
<div class="offcanvas offcanvas-bottom" id="trip-modal" tabindex="-1" style="border-radius:22px 22px 0 0;max-height:85vh;">
  <div class="modal-handle"></div>
  <div class="offcanvas-header border-bottom pb-3">
    <span class="fw-bold fs-6" id="trip-modal-title">新增旅程</span>
    <button type="button" class="btn-close" id="trip-modal-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
      <input type="hidden" id="t-id" />
      <div class="mb-3">
        <label class="form-label small fw-semibold">旅程名稱 *</label>
        <input class="form-control" id="t-name" type="text" placeholder="例：2025 東京之旅" />
      </div>
      <div class="row g-2">
        <div class="col mb-3">
          <label class="form-label small fw-semibold">出發日期</label>
          <input class="form-control" id="t-start" type="date" />
        </div>
        <div class="col mb-3">
          <label class="form-label small fw-semibold">回程日期</label>
          <input class="form-control" id="t-end" type="date" />
        </div>
      </div>
      <div class="row g-2">
        <div class="col mb-3">
          <label class="form-label small fw-semibold">人數</label>
          <input class="form-control" id="t-people" type="number" placeholder="2" />
        </div>
        <div class="col mb-3">
          <label class="form-label small fw-semibold">總預算（TWD）</label>
          <input class="form-control" id="t-budget" type="number" placeholder="50000" />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">狀態</label>
        <select class="form-select" id="t-status">
          <option value="計畫中">計畫中</option>
          <option value="確認">確認</option>
          <option value="完成">完成</option>
        </select>
      </div>
      <div class="modal-footer-row" id="trip-btn-row">
        <button class="btn btn-danger" id="trip-save-btn">建立旅程</button>
      </div>
    </div>
  </div>
</div>

<!-- ── EXPENSE MODAL ────────────────────────────────────────────────────── -->
<div class="offcanvas offcanvas-bottom" id="expense-modal" tabindex="-1" style="border-radius:22px 22px 0 0;max-height:85vh;">
  <div class="modal-handle"></div>
  <div class="offcanvas-header border-bottom pb-3">
    <span class="fw-bold fs-6">新增費用</span>
    <button type="button" class="btn-close" id="expense-modal-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
      <input type="hidden" id="e-id" />
      <div class="mb-3">
        <label class="form-label small fw-semibold">項目名稱 *</label>
        <input class="form-control" id="e-name" type="text" placeholder="例：晚餐" />
      </div>
      <div class="row g-2">
        <div class="col mb-3">
          <label class="form-label small fw-semibold">金額（JPY）</label>
          <input class="form-control" id="e-amount" type="number" placeholder="0" />
        </div>
        <div class="col mb-3">
          <label class="form-label small fw-semibold">日期</label>
          <input class="form-control" id="e-date" type="date" />
        </div>
      </div>
      <div class="row g-2">
        <div class="col mb-3">
          <label class="form-label small fw-semibold">類別</label>
          <select class="form-select" id="e-category">
            <option value="">— 選擇 —</option>
            <option>🍽️ 餐飲</option>
            <option>🚌 交通</option>
            <option>🏨 住宿</option>
            <option>🎡 娛樂</option>
            <option>🛍️ 購物</option>
            <option>💊 醫療</option>
            <option>📦 其他</option>
          </select>
        </div>
        <div class="col mb-3">
          <label class="form-label small fw-semibold">付款人</label>
          <input class="form-control" id="e-payer" type="text" placeholder="姓名" />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">備註</label>
        <textarea class="form-control" id="e-notes" placeholder="備註..." rows="2"></textarea>
      </div>
      <div class="modal-footer-row" id="expense-btn-row">
        <button class="btn btn-danger" id="expense-save-btn">儲存</button>
      </div>
    </div>
  </div>
</div>

<!-- ── TRANSIT SHEET ─────────────────────────────────────────────────────── -->
<div class="offcanvas offcanvas-bottom" id="transit-sheet" tabindex="-1" style="border-radius:22px 22px 0 0;height:auto;min-height:260px;max-height:78vh;">
  <div class="modal-handle"></div>
  <div class="offcanvas-header border-bottom pb-3">
      <div>
        <div class="transit-sheet-title">🚆 班次查詢</div>
        <div class="transit-sheet-subtitle" id="transit-subtitle"></div>
      </div>
    <button type="button" class="btn-close" id="transit-close-btn" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div id="transit-routes"><div class="spinner"></div></div>
    </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
  const API = '/api';
  let TWD_RATE = parseFloat(localStorage.getItem('twd_rate') || '0.21');

  /* ── Bootstrap Offcanvas instances ─────────────────────────────────── */
  const bsModal = () => bootstrap.Offcanvas.getOrCreateInstance(document.getElementById('modal'));
  const bsTripModal = () => bootstrap.Offcanvas.getOrCreateInstance(document.getElementById('trip-modal'));
  const bsExpenseModal = () => bootstrap.Offcanvas.getOrCreateInstance(document.getElementById('expense-modal'));
  const bsTransitSheet = () => bootstrap.Offcanvas.getOrCreateInstance(document.getElementById('transit-sheet'));

  /* ── state ─────────────────────────────────────────────────────────── */
  let trips = [];
  let currentTripId = null;
  let currentView = 'itinerary';
  let itineraryData = [];
  let expensesData = [];

  /* ── utils ─────────────────────────────────────────────────────────── */
  function toast(msg, duration = 2000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
  }

  function fmtJPY(n) {
    if (!n && n !== 0) return '';
    return '¥' + Number(n).toLocaleString();
  }
  function fmtTWD(n) {
    if (!n && n !== 0) return '';
    return 'NT$' + Math.round(n * TWD_RATE).toLocaleString() + ' TWD';
  }

  function fmtDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    const weekdays = ['日','一','二','三','四','五','六'];
    return `${d.getMonth()+1}/${d.getDate()} (${weekdays[d.getDay()]})`;
  }

  function groupByDate(items) {
    const map = {};
    items.forEach(item => {
      const key = item.date || '（未設定日期）';
      if (!map[key]) map[key] = [];
      map[key].push(item);
    });
    return map;
  }

  /* ── API calls ──────────────────────────────────────────────────────── */
  async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts,
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err || res.statusText);
    }
    return res.json();
  }

  /* ── TRIPS ──────────────────────────────────────────────────────────── */
  async function loadTrips() {
    try {
      trips = await apiFetch('/trips');
      renderTripSelector();
      renderTripsView();
    } catch (e) {
      toast('載入旅程失敗：' + e.message);
    }
  }

  function renderTripSelector() {
    const sel = document.getElementById('trip-selector');
    sel.innerHTML = trips.length
      ? trips.map(t => `<option value="${t.id}">${t.name}${t.start_date ? ' · '+t.start_date.slice(0,7) : ''}</option>`).join('')
      : '<option value="">（無旅程）</option>';

    if (trips.length) {
      if (!currentTripId || !trips.find(t => t.id === currentTripId)) {
        currentTripId = trips[0].id;
      }
      sel.value = currentTripId;
    }
  }

  function renderTripsView() {
    const el = document.getElementById('trips-content');
    const addBtnHTML = `<button class="btn btn-primary" style="width:100%;margin-bottom:14px;" onclick="openTripModal()">＋ 新增旅程</button>`;
    if (!trips.length) {
      el.innerHTML = addBtnHTML + `<div class="empty"><div class="emoji">🧳</div><p>還沒有旅程，點上方按鈕新增！</p></div>`;
      return;
    }
    el.innerHTML = addBtnHTML + trips.map(t => `
      <div class="trip-card" data-id="${t.id}">
        <div class="trip-card-header">
          <div class="trip-name">${t.name}</div>
          ${t.status ? `<span class="trip-badge badge-${t.status}">${t.status}</span>` : ''}
        </div>
        ${t.start_date ? `<div class="trip-dates">📅 ${t.start_date} → ${t.end_date || '?'}</div>` : ''}
        <div class="trip-info">
          ${t.people != null ? `<div class="trip-info-item"><strong>${t.people}</strong>人</div>` : ''}
          ${t.budget_twd != null ? `<div class="trip-info-item"><strong>NT$${Number(t.budget_twd).toLocaleString()}</strong>預算</div>` : ''}
        </div>
        <div class="trip-card-actions">
          <button class="trip-action-btn trip-delete-btn" data-id="${t.id}">🗑️ 刪除</button>
          <button class="trip-action-btn trip-edit-btn" data-id="${t.id}">✏️ 編輯</button>
        </div>
      </div>
    `).join('');

    el.querySelectorAll('.trip-edit-btn').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); openEditTripModal(btn.dataset.id); });
    });
    el.querySelectorAll('.trip-delete-btn').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); deleteTripById(btn.dataset.id); });
    });
  }

  /* ── ITINERARY ──────────────────────────────────────────────────────── */
  async function loadItinerary() {
    if (!currentTripId) {
      document.getElementById('itinerary-content').innerHTML =
        `<div class="empty"><div class="emoji">✈️</div><p>請先選擇旅程</p></div>`;
      return;
    }
    document.getElementById('itinerary-content').innerHTML = '<div class="spinner"></div>';
    try {
      itineraryData = await apiFetch(`/itinerary/${currentTripId}`);
      renderItinerary();
      // prefetchMapData 已移除
    } catch (e) {
      document.getElementById('itinerary-content').innerHTML =
        `<div class="empty"><p>載入失敗：${e.message}</p></div>`;
    }
  }

  // 背景預取：在行程載入後就開始 geocode + 路線查詢，全存入快取
  async function prefetchMapData() {
    if (!itineraryData.length || !currentTripId) return;
    const tripObj = trips.find(t => t.id === currentTripId);
    const destHint = tripObj ? tripObj.name.replace(/[🍺🌸✈️⛩️🏯🎌🧳]/gu, '').trim().split(/\s/)[0] : '';
    const items = itineraryData.filter(i => i.maps_url || i.type !== '🚉 交通');
    const groups = groupByDate(items);
    for (const date of Object.keys(groups).sort()) {
      const dayCoords = [];
      for (const item of groups[date]) {
        let coords = extractCoordsFromUrl(item.maps_url);
        if (!coords) {
          const q = (item.address || item.name) + (destHint ? ' ' + destHint : '');
          coords = await geocodePlace(q);
        }
        if (coords) dayCoords.push(coords);
      }
      for (let i = 0; i < dayCoords.length - 1; i++) {
        await getTransitTime(dayCoords[i], dayCoords[i + 1]);
      }
    }
  }

  function renderItinerary() {
    const el = document.getElementById('itinerary-content');
    if (!itineraryData.length) {
      el.innerHTML = `<div class="empty"><div class="emoji">🗺️</div><p>還沒有行程，點 ＋ 新增！</p></div>`;
      return;
    }
    const groups = groupByDate(itineraryData);
    const dates = Object.keys(groups).sort();

    // 計算第幾日（以最早日期為第1日）
    const firstDate = dates.find(d => d !== '（未設定日期）') || dates[0];
    function dayIndex(date) {
      if (date === '（未設定日期）') return null;
      const diff = Math.round((new Date(date) - new Date(firstDate)) / 86400000);
      return diff + 1;
    }

    el.innerHTML = dates.map(date => {
      const idx = dayIndex(date);
      const label = date === '（未設定日期）' ? '未設定日期' : fmtDate(date);
      const badge = idx != null ? `<span class="day-badge">第 ${idx} 日</span>` : '';
      const items = groups[date];
      const itemsHTML = items.map(item => renderItemCard(item)).join('');
      const addBtn = date !== '（未設定日期）'
        ? `<button class="day-add-btn" data-date="${date}">＋ 新增行程</button>`
        : `<button class="day-add-btn" data-date="">＋ 新增行程</button>`;
      return `
        <div class="day-group" data-date="${date}">
          <div class="day-label">
            <div class="day-label-left">
              ${badge}
              <span>${label}</span>
            </div>
            <span class="day-chevron">▼</span>
          </div>
          <div class="day-items">${itemsHTML}</div>
          ${addBtn}
        </div>
      `;
    }).join('');

    // 折疊功能
    el.querySelectorAll('.day-label').forEach(label => {
      const group = label.closest('.day-group');
      const items = group.querySelector('.day-items');
      items.style.maxHeight = items.scrollHeight + 'px';
      label.addEventListener('click', () => {
        const collapsed = group.classList.toggle('collapsed');
        if (!collapsed) items.style.maxHeight = items.scrollHeight + 'px';
      });
    });

    // attach events
    el.querySelectorAll('.item-card').forEach(card => {
      const id = card.dataset.id;
      card.querySelector('.item-check').addEventListener('click', e => {
        e.stopPropagation();
        toggleDone(id);
      });
      card.querySelector('.drag-handle').addEventListener('click', e => e.stopPropagation());
      card.addEventListener('click', () => openEditModal(id));
    });
    el.querySelectorAll('.maps-link').forEach(a => {
      a.addEventListener('click', e => e.stopPropagation());
    });

    el.querySelectorAll('.transit-query-btn').forEach(a => {
      a.addEventListener('click', e => e.stopPropagation());
    });

    // 時間 inline 編輯
    el.querySelectorAll('.item-time').forEach(span => {
      span.addEventListener('click', e => {
        e.stopPropagation();
        openTimePopover(span.dataset.id, span);
      });
    });

    // 每日新增按鈕
    el.querySelectorAll('.day-add-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        openAddModal(btn.dataset.date || '');
      });
    });

    // SortableJS — 每個 day-items 各自可拖拉
    el.querySelectorAll('.day-items').forEach(container => {
      Sortable.create(container, {
        handle: '.drag-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        dragClass: 'sortable-drag',
        onEnd(evt) {
          const id = evt.item.dataset.id;
          // 拖拉後彈出時間編輯，讓使用者確認/修改新時間
          const timeSpan = evt.item.querySelector('.item-time');
          if (timeSpan) openTimePopover(id, timeSpan);
        },
      });
    });
  }

  // ── 時間 Popover ──────────────────────────────────────────────────────────
  let _popover = null;
  function closeTimePopover() {
    if (_popover) { _popover.remove(); _popover = null; }
    document.removeEventListener('click', closeTimePopover);
  }

  function openTimePopover(id, anchorEl) {
    closeTimePopover();
    const item = itineraryData.find(i => i.id === id);
    if (!item) return;

    const pop = document.createElement('div');
    pop.className = 'time-popover';
    pop.innerHTML = `
      <input type="time" value="${item.time || ''}" />
      <button class="time-popover-save">確認</button>
    `;
    document.body.appendChild(pop);
    _popover = pop;

    // 定位到錨點下方
    const rect = anchorEl.getBoundingClientRect();
    pop.style.top  = (rect.bottom + 8) + 'px';
    pop.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';

    const input = pop.querySelector('input');
    input.focus();

    pop.querySelector('.time-popover-save').addEventListener('click', async e => {
      e.stopPropagation();
      const newTime = input.value;
      closeTimePopover();
      try {
        await apiFetch(`/itinerary/${id}`, { method: 'PUT', body: JSON.stringify({ time: newTime }) });
        item.time = newTime;
        toast('時間已更新');
        renderItinerary();
      } catch(e) { toast('更新失敗'); }
    });

    pop.addEventListener('click', e => e.stopPropagation());
    setTimeout(() => document.addEventListener('click', closeTimePopover), 100);
  }

  function parseTransitNames(name) {
    const m = name ? name.match(/(.+?)\s*[→>]\s*(.+)/) : null;
    return m ? { from: m[1].trim(), to: m[2].trim() } : null;
  }

  function renderItemCard(item) {

  function renderExpenses() {
    const el = document.getElementById('expenses-content');
    const total = expensesData.reduce((s, e) => s + (e.amount_jpy || 0), 0);

    // category totals
    const catMap = {};
    expensesData.forEach(e => {
      const cat = e.category || '其他';
      catMap[cat] = (catMap[cat] || 0) + (e.amount_jpy || 0);
    });

    const summaryHTML = `
      <div class="expense-summary">
        <h2>總支出</h2>
        <div class="expense-total-jpy">${fmtJPY(total)}</div>
        <div class="expense-total-twd">≈ ${fmtTWD(total)}</div>
        <div class="rate-row">
          <span style="font-size:12px;opacity:.8;">JPY → TWD</span>
          <input class="rate-input" id="rate-input" type="number" step="0.001" value="${TWD_RATE}" />
          <button class="rate-btn" id="rate-save-btn">套用</button>
          <button class="rate-btn" id="rate-live-btn">⟳ 即時匯率</button>
          <span class="rate-live-badge" id="rate-badge"></span>
        </div>
      </div>
      <div class="category-chips">
        ${Object.entries(catMap).map(([cat, amt]) =>
          `<div class="cat-chip">${cat} <span>${fmtJPY(amt)}</span></div>`
        ).join('')}
      </div>
    `;

    if (!expensesData.length) {
      el.innerHTML = summaryHTML + `<div class="empty"><div class="emoji">💰</div><p>還沒有費用記錄</p></div>`;
      return;
    }

    const listHTML = `
      <div class="section-title">明細</div>
      ${expensesData.map(exp => `
        <div class="expense-card" data-id="${exp.id}" style="cursor:pointer;">
          <div class="expense-card-left">
            <div class="exp-name">${exp.name}</div>
            <div class="exp-meta">${exp.category || ''} ${exp.date ? '· ' + exp.date : ''} ${exp.payer ? '· ' + exp.payer : ''}</div>
          </div>
          <div class="expense-card-right">
            <div class="exp-jpy">${fmtJPY(exp.amount_jpy)}</div>
            <div class="exp-twd">${fmtTWD(exp.amount_jpy)}</div>
          </div>
        </div>
      `).join('')}
    `;

    el.innerHTML = summaryHTML + listHTML;

    el.querySelectorAll('.expense-card[data-id]').forEach(card => {
      card.addEventListener('click', () => openEditExpenseModal(card.dataset.id));
    });

    // 匯率：手動套用
    document.getElementById('rate-save-btn').addEventListener('click', () => {
      const val = parseFloat(document.getElementById('rate-input').value);
      if (!val || val <= 0) return;
      TWD_RATE = val;
      localStorage.setItem('twd_rate', val);
      document.getElementById('rate-badge').textContent = '已套用';
      renderExpenses();
    });

    // 匯率：抓即時匯率（多個來源輪流試）
    document.getElementById('rate-live-btn').addEventListener('click', async () => {
      const badge = document.getElementById('rate-badge');
      badge.textContent = '查詢中...';

      const sources = [
        async () => {
          const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/jpy.json');
          const d = await r.json();
          return d.jpy.twd;
        },
        async () => {
          const r = await fetch('https://api.exchangerate-api.com/v4/latest/JPY');
          const d = await r.json();
          return d.rates.TWD;
        },
        async () => {
          const r = await fetch('https://open.er-api.com/v6/latest/JPY');
          const d = await r.json();
          return d.rates.TWD;
        },
      ];

      let rate = null;
      for (const fn of sources) {
        try { rate = await fn(); if (rate) break; } catch(e) {}
      }

      if (!rate) {
        badge.textContent = '查詢失敗，請手動輸入';
        return;
      }

      TWD_RATE = rate;
      localStorage.setItem('twd_rate', rate);
      document.getElementById('rate-input').value = rate.toFixed(4);
      badge.textContent = `✓ ${new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'})} 更新`;
      renderExpenses();
    });
  }

  /* ── Places Autocomplete ────────────────────────────────────────── */
  let _nameAutocomplete = null;

  function initPlacesAutocomplete() {
    if (_nameAutocomplete || !window.google?.maps?.places) return;
    const input = document.getElementById('f-name');
    _nameAutocomplete = new google.maps.places.Autocomplete(input, {
      language: 'zh-TW',
      fields: ['name', 'formatted_address', 'place_id', 'types', 'geometry'],
    });
    // Prevent form submit on Enter
    input.addEventListener('keydown', e => { if (e.key === 'Enter') e.preventDefault(); });
    _nameAutocomplete.addListener('place_changed', () => {
      const place = _nameAutocomplete.getPlace();
      if (!place.place_id) return;

      // Fill name (clean display name)
      input.value = place.name || input.value;

      // Fill address
      if (place.formatted_address) {
        document.getElementById('f-address').value = place.formatted_address;
      }

      // Build Maps URL using place_id
      document.getElementById('f-maps').value =
        `https://www.google.com/maps/place/?q=place_id:${place.place_id}`;

      // Auto-select type from Google place types
      const types = place.types || [];
      const typeMap = [
        [['restaurant','food','cafe','bar','bakery'], '🍽️ 餐廳'],
        [['lodging','hotel'], '🏨 住宿'],
        [['store','shopping_mall','department_store'], '🛍️ 購物'],
        [['subway_station','train_station','transit_station','bus_station','airport'], '🚉 交通'],
      ];
      let matched = '';
      for (const [keys, label] of typeMap) {
        if (keys.some(k => types.includes(k))) { matched = label; break; }
      }
      if (matched) {
        const sel = document.getElementById('f-type');
        for (const opt of sel.options) { if (opt.value === matched) { sel.value = matched; break; } }
      } else {
        document.getElementById('f-type').value = '🏛️ 景點';
      }
    });
  }

  // Itinerary modal
  function nextDayTime(date) {
    if (!date) return '';
    const dayItems = itineraryData
      .filter(i => i.date === date && i.time && /^\d{1,2}:\d{2}$/.test(i.time))
      .sort((a, b) => a.time.localeCompare(b.time));
    if (!dayItems.length) return '';
    const last = dayItems[dayItems.length - 1].time;
    const [h, m] = last.split(':').map(Number);
    const next = new Date(2000, 0, 1, h + 1, m);
    // cap at 23:59
    if (next.getDate() > 1) return '23:59';
    return `${String(next.getHours()).padStart(2,'0')}:${String(next.getMinutes()).padStart(2,'0')}`;
  }

      id: 'todo', name: '📝 旅途待辦', color: CAT_COLORS[4], items: [] }
  ];

  function clKey(tripId) { return `checklist_${tripId}`; }

  function getChecklist(tripId) {
    const raw = localStorage.getItem(clKey(tripId));
    return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULT_CHECKLIST));
  }
  function saveChecklist(tripId, data) {
    localStorage.setItem(clKey(tripId), JSON.stringify(data));
  }

  function loadChecklist() {
    const el = document.getElementById('checklist-content');
    if (!currentTripId) {
      el.innerHTML = `<div class="empty"><div class="emoji">✅</div><p>請先選擇旅程</p></div>`;
      return;
    }
    renderChecklist(getChecklist(currentTripId));
  }

  function renderChecklist(data) {
    const el = document.getElementById('checklist-content');
    const total = data.reduce((s, c) => s + c.items.length, 0);
    const done  = data.reduce((s, c) => s + c.items.filter(i => i.done).length, 0);
    const pct   = total ? Math.round(done / total * 100) : 0;

    el.innerHTML = `
      <div class="checklist-summary">${done} / ${total} 完成</div>
      <div class="checklist-progress"><div class="checklist-progress-bar" style="width:${pct}%"></div></div>
      ${data.map((cat, ci) => `
        <div class="checklist-category" data-ci="${ci}">
          <div class="checklist-cat-header" style="background:${cat.color}">
            <div class="checklist-cat-title">
              ${cat.name}
              <span class="checklist-cat-count">${cat.items.filter(i=>i.done).length}/${cat.items.length}</span>
            </div>
            <span class="checklist-cat-chevron">▼</span>
          </div>
          <div class="checklist-cat-items">
            ${cat.items.map((item, ii) => `
              <div class="checklist-item ${item.done?'done':''}" data-ci="${ci}" data-ii="${ii}">
                <div class="checklist-cb">
                  <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                    <path d="M1 3.5L3.5 6.5L9 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <span class="checklist-item-text">${item.text}</span>
                <span class="checklist-item-del" data-ci="${ci}" data-ii="${ii}">✕</span>
              </div>
            `).join('')}
            <div class="checklist-add-row">
              <input class="checklist-add-input" placeholder="新增項目..." data-ci="${ci}" />
              <button class="checklist-add-btn" data-ci="${ci}">＋</button>
            </div>
          </div>
        </div>
      `).join('')}
    `;

    // 折疊
    el.querySelectorAll('.checklist-cat-header').forEach(hdr => {
      const cat = hdr.closest('.checklist-category');
      const items = cat.querySelector('.checklist-cat-items');
      items.style.maxHeight = items.scrollHeight + 'px';
      hdr.addEventListener('click', () => {
        const collapsed = cat.classList.toggle('collapsed');
        if (!collapsed) items.style.maxHeight = items.scrollHeight + 'px';
      });
    });

    // 勾選
    el.querySelectorAll('.checklist-item').forEach(row => {
      const { ci, ii } = row.dataset;
      row.querySelector('.checklist-cb').addEventListener('click', e => {
        e.stopPropagation();
        data[ci].items[ii].done = !data[ci].items[ii].done;
        saveChecklist(currentTripId, data);
        renderChecklist(data);
      });
    });

    // 刪除
    el.querySelectorAll('.checklist-item-del').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const { ci, ii } = btn.dataset;
        data[ci].items.splice(ii, 1);
        saveChecklist(currentTripId, data);
        renderChecklist(data);
      });
    });

    // 新增
    el.querySelectorAll('.checklist-add-btn').forEach(btn => {
      const ci = btn.dataset.ci;
      const input = el.querySelector(`.checklist-add-input[data-ci="${ci}"]`);
      const add = () => {
        const text = input.value.trim();
        if (!text) return;
        data[ci].items.push({ id: Date.now() + '', text, done: false });
        saveChecklist(currentTripId, data);
        renderChecklist(data);
      };
      btn.addEventListener('click', add);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
    });
  }

  /* ── MAP ────────────────────────────────────────────────────────────── */
  let mapInstance = null;
  let _mapOverlays = [];
  const DAY_COLORS = ['#C0392B','#1565C0','#2E7D32','#6A1B9A','#E65100','#00695C','#AD1457'];

  const LS_GEO = 'travel_geocode_v2';
  const LS_TRANSIT = 'travel_transit_v2';
  let geocodeCache = {};
  let transitCache = {};
  try { geocodeCache = JSON.parse(localStorage.getItem(LS_GEO) || '{}'); } catch(e) {}
  try { transitCache = JSON.parse(localStorage.getItem(LS_TRANSIT) || '{}'); } catch(e) {}
  function saveGeocodeCache() { try { localStorage.setItem(LS_GEO, JSON.stringify(geocodeCache)); } catch(e) {} }
  function saveTransitCache() { try { localStorage.setItem(LS_TRANSIT, JSON.stringify(transitCache)); } catch(e) {} }

  function extractCoordsFromUrl(url) {
    if (!url) return null;
    const m = url.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
    return m ? [parseFloat(m[1]), parseFloat(m[2])] : null;
  }

  function haversineDistance(c1, c2) {
    const R = 6371000;
    const [φ1, λ1] = c1.map(x => x * Math.PI / 180);
    const [φ2, λ2] = c2.map(x => x * Math.PI / 180);
    const a = Math.sin((φ2-φ1)/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin((λ2-λ1)/2)**2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  function transitKey(c1, c2) {
    return `${c1[0].toFixed(4)},${c1[1].toFixed(4)}>${c2[0].toFixed(4)},${c2[1].toFixed(4)}`;
  }

  // ── Google Maps API loader ──────────────────────────────────────────────
  let _googleMapsLoaded = false;
  let _googleMapsLoadPromise = null;

  function loadGoogleMapsAPI(key) {
    if (_googleMapsLoaded) return Promise.resolve();
    if (_googleMapsLoadPromise) return _googleMapsLoadPromise;
    _googleMapsLoadPromise = new Promise(resolve => {
      window.__gmapsReady = () => { _googleMapsLoaded = true; resolve(); };
      const s = document.createElement('script');
      s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places&callback=__gmapsReady&language=zh-TW`;
      document.head.appendChild(s);
    });
    return _googleMapsLoadPromise;
  }

  // ── Geocoding ────────────────────────────────────────────────────────────
  let _geocoder = null;
  async function geocodePlace(query) {
    if (geocodeCache[query]) return geocodeCache[query];
    if (!_geocoder) _geocoder = new google.maps.Geocoder();
    return new Promise(resolve => {
      _geocoder.geocode({ address: query, region: 'jp' }, (results, status) => {
        if (status === 'OK' && results[0]) {
          const loc = results[0].geometry.location;
          const coords = [loc.lat(), loc.lng()];
          geocodeCache[query] = coords;
          saveGeocodeCache();
          resolve(coords);
        } else {
          resolve(null);
        }
      });
    });
  }

  // ── Routes API (new, replaces DirectionsService for transit) ────────────
  let _mapsApiKey = null;
  const _routeResultCache = {}; // key → LatLng[] decoded path

  function decodePolyline(encoded) {
    const pts = [];
    let i = 0, lat = 0, lng = 0;
    while (i < encoded.length) {
      let s = 0, r = 0, b;
      do { b = encoded.charCodeAt(i++) - 63; r |= (b & 0x1f) << s; s += 5; } while (b >= 0x20);
      lat += (r & 1) ? ~(r >> 1) : r >> 1;
      s = 0; r = 0;
      do { b = encoded.charCodeAt(i++) - 63; r |= (b & 0x1f) << s; s += 5; } while (b >= 0x20);
      lng += (r & 1) ? ~(r >> 1) : r >> 1;
      pts.push(new google.maps.LatLng(lat / 1e5, lng / 1e5));
    }
    return pts;
  }

  function tomorrow9amDate() {
    const t = new Date(); t.setDate(t.getDate() + 1); t.setHours(9, 0, 0, 0); return t;
  }

  async function callRoutesAPI(coords1, coords2, { mode = 'TRANSIT', alternatives = false, departureTime = null, fieldMask = null } = {}) {
    if (!_mapsApiKey) return null;
    const depTime = departureTime || tomorrow9amDate();
    const body = {
      origin:      { location: { latLng: { latitude: coords1[0], longitude: coords1[1] } } },
      destination: { location: { latLng: { latitude: coords2[0], longitude: coords2[1] } } },
      travelMode: mode,
      computeAlternativeRoutes: alternatives,
    };
    if (mode === 'TRANSIT') {
      body.departureTime = depTime.toISOString();
      body.transitPreferences = { routingPreference: 'FEWER_TRANSFERS' };
    }
    const mask = fieldMask || (mode === 'TRANSIT'
      ? 'routes.duration,routes.legs,routes.polyline.encodedPolyline,routes.travelAdvisory.transitFare'
      : 'routes.duration,routes.polyline.encodedPolyline');
    try {
      const res = await fetch('https://routes.googleapis.com/directions/v2:computeRoutes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': _mapsApiKey, 'X-Goog-FieldMask': mask },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) { console.warn('[Routes API]', mode, data?.error?.message || res.status); return null; }
      return data.routes?.length ? data.routes : null;
    } catch(e) { console.error('[Routes API] fetch error:', e); return null; }
  }

  async function getTransitTime(coords1, coords2) {
    const key = transitKey(coords1, coords2);
    if (transitCache[key]?.isTransit) return transitCache[key];

    // Try TRANSIT via Routes API
    const transitRoutes = await callRoutesAPI(coords1, coords2, { mode: 'TRANSIT' });
    if (transitRoutes?.[0]) {
      const minutes = Math.round(parseInt(transitRoutes[0].duration) / 60);
      const info = { minutes, isTransit: true };
      const enc = transitRoutes[0].polyline?.encodedPolyline;
      if (enc) _routeResultCache[key] = decodePolyline(enc);
      transitCache[key] = info; saveTransitCache();
      return info;
    }

    // Fall back to DRIVING
    const drivingRoutes = await callRoutesAPI(coords1, coords2, { mode: 'DRIVE' });
    if (drivingRoutes?.[0]) {
      const minutes = Math.round(parseInt(drivingRoutes[0].duration) / 60);
      const enc = drivingRoutes[0].polyline?.encodedPolyline;
      if (enc) _routeResultCache[key] = decodePolyline(enc);
      return { minutes, isTransit: false };
    }

    const dist = haversineDistance(coords1, coords2);
    return { minutes: Math.max(Math.round(dist / 1000 / 4.5 * 60), 1), isTransit: false };
  }

  async function fetchRouteForMap(coords1, coords2) {
    const key = transitKey(coords1, coords2);
    if (_routeResultCache[key]) return _routeResultCache[key];
    for (const mode of ['TRANSIT', 'DRIVE']) {
      const routes = await callRoutesAPI(coords1, coords2, { mode });
      const enc = routes?.[0]?.polyline?.encodedPolyline;
      if (enc) { const path = decodePolyline(enc); _routeResultCache[key] = path; return path; }
    }
    return null;
  }

  let _mapLoading = false;

  async function loadMapView() {
    if (_mapLoading) return; // prevent concurrent loads
    _mapLoading = true;
    const container = document.getElementById('map-container');

    if (!currentTripId) {
      _mapLoading = false;
      container.innerHTML = '<div class="map-loading"><div class="emoji">🗾</div><span>請先選擇旅程</span></div>';
      return;
    }

    container.innerHTML = '<div class="map-loading"><div class="spinner"></div><span>正在載入地圖...</span></div>';

    try {
      if (!itineraryData.length) itineraryData = await apiFetch(`/itinerary/${currentTripId}`);
    } catch(e) {
      _mapLoading = false;
      container.innerHTML = `<div class="map-loading"><span>載入失敗：${e.message}</span></div>`;
      return;
    }

    try {
      const config = await apiFetch('/config');
      if (!config.maps_key) {
        _mapLoading = false;
        container.innerHTML = '<div class="map-loading"><span>請在 .env 設定 GOOGLE_MAPS_API_KEY</span></div>';
        return;
      }
      _mapsApiKey = config.maps_key;
      await loadGoogleMapsAPI(config.maps_key);
    } catch(e) {
      _mapLoading = false;
      container.innerHTML = `<div class="map-loading"><span>地圖載入失敗：${e.message}</span></div>`;
      return;
    }

    const items = itineraryData.filter(i => i.maps_url || i.type !== '🚉 交通');
    container.innerHTML = '<div id="gmap"></div>';

    _mapOverlays.forEach(o => { if (o.setMap) o.setMap(null); });
    _mapOverlays = [];

    mapInstance = new google.maps.Map(document.getElementById('gmap'), {
      zoom: 13,
      center: { lat: 33.59, lng: 130.40 },
      mapTypeControl: false,
      fullscreenControl: false,
      streetViewControl: false,
      gestureHandling: 'greedy',
    });

    const tripObj = trips.find(t => t.id === currentTripId);
    const destHint = tripObj ? tripObj.name.replace(/[🍺🌸✈️⛩️🏯🎌🧳]/gu, '').trim().split(/\s/)[0] : '';

    const groups = groupByDate(items);
    const dates = Object.keys(groups).sort();
    const allLatLngs = [];
    const dayOverlayGroups = [];
    const dayLatLngsList = [];
    const dayMeta = [];
    const allPlaceMarkers = [];  // { item, coords, marker, infoWindow, dayIndex, cardId, color }

    for (let di = 0; di < dates.length; di++) {
      const date = dates[di];
      const color = DAY_COLORS[di % DAY_COLORS.length];
      const dayItemsWC = [];
      const overlays = [];

      for (const item of groups[date]) {
        let coords = extractCoordsFromUrl(item.maps_url);
        if (!coords) {
          const q = (item.address || item.name) + (destHint ? ' ' + destHint : '');
          coords = await geocodePlace(q);
        }
        if (!coords) continue;

        dayItemsWC.push({ item, coords });
        allLatLngs.push(new google.maps.LatLng(coords[0], coords[1]));

        const svgMarker = `<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30"><circle cx="15" cy="15" r="13" fill="${color}" stroke="white" stroke-width="2"/><text x="15" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="white">${di+1}</text></svg>`;
        const marker = new google.maps.Marker({
          position: { lat: coords[0], lng: coords[1] },
          map: mapInstance,
          icon: {
            url: 'data:image/svg+xml,' + encodeURIComponent(svgMarker),
            scaledSize: new google.maps.Size(30, 30),
            anchor: new google.maps.Point(15, 15),
          },
        });
        const infoWindow = new google.maps.InfoWindow({ content: `
          <div style="min-width:150px;font-family:sans-serif;line-height:1.5;">
            <div style="font-weight:700;font-size:14px;">${item.name}</div>
            ${item.time ? `<div style="font-size:12px;color:#666;">🕐 ${item.time}</div>` : ''}
            ${item.type ? `<div style="font-size:12px;color:#666;">${item.type}</div>` : ''}
            ${item.cost_jpy ? `<div style="font-size:12px;color:#C0392B;font-weight:600;">¥${item.cost_jpy.toLocaleString()}</div>` : ''}
            ${item.notes ? `<div style="font-size:11px;color:#888;margin-top:2px;">${item.notes}</div>` : ''}
            ${item.maps_url ? `<a href="${item.maps_url}" target="_blank" style="font-size:12px;color:#1565C0;display:block;margin-top:4px;">📍 Google Maps</a>` : ''}
          </div>` });
        const cardId = `mc-${item.id}`;
        marker.addListener('click', () => {
          infoWindow.open(mapInstance, marker);
          // sync bottom strip
          const card = document.getElementById(cardId);
          if (card) {
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            document.querySelectorAll('.map-spot-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
          }
        });
        overlays.push(marker);
        allPlaceMarkers.push({ item, coords, marker, infoWindow, dayIndex: di, cardId, color });
      }

      if (dayItemsWC.length > 1) {
        for (let i = 0; i < dayItemsWC.length - 1; i++) {
          const c1 = dayItemsWC[i].coords;
          const c2 = dayItemsWC[i + 1].coords;
          const fromItem = dayItemsWC[i].item;
          const toItem   = dayItemsWC[i + 1].item;
          const mid = { lat: (c1[0] + c2[0]) / 2, lng: (c1[1] + c2[1]) / 2 };
          const key = transitKey(c1, c2);

          const info = await getTransitTime(c1, c2);
          // isTransit=false means API failed → haversine estimate; only treat as walkable if short
          const isWalkable = info.isTransit ? info.minutes <= 12 : info.minutes <= 25;

          let segPath = _routeResultCache[key];
          if (!segPath) segPath = await fetchRouteForMap(c1, c2);
          if (!segPath || segPath.length < 2)
            segPath = [new google.maps.LatLng(c1[0], c1[1]), new google.maps.LatLng(c2[0], c2[1])];

          if (isWalkable) {
            // Walking: green dashed line
            overlays.push(new google.maps.Polyline({
              path: segPath,
              map: mapInstance,
              strokeColor: '#43A047',
              strokeWeight: 3,
              strokeOpacity: 0,
              icons: [{ icon: { path: 'M 0,-1 0,1', strokeOpacity: 0.8, strokeColor: '#43A047', scale: 3 }, offset: '0', repeat: '10px' }],
            }));
          } else {
            // Transit: solid line in day color
            overlays.push(new google.maps.Polyline({
              path: segPath,
              map: mapInstance,
              strokeColor: color,
              strokeWeight: 5,
              strokeOpacity: 0.9,
            }));
          }

          const labelText = isWalkable ? `🚶 ${info.minutes}分` : `🚇 ${info.minutes}分`;
          const bgColor   = isWalkable ? 'rgba(46,125,50,0.9)' : 'rgba(21,101,192,0.9)';

          const svgLabel = `<svg xmlns="http://www.w3.org/2000/svg" width="90" height="24"><rect x="0" y="0" rx="12" ry="12" width="90" height="24" fill="${bgColor}"/><text x="45" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="white">${labelText}</text></svg>`;
          const labelMarker = new google.maps.Marker({
            position: mid,
            map: mapInstance,
            icon: {
              url: 'data:image/svg+xml,' + encodeURIComponent(svgLabel),
              scaledSize: new google.maps.Size(90, 24),
              anchor: new google.maps.Point(45, 12),
            },
            clickable: !isWalkable,
          });
          if (!isWalkable) {
            labelMarker.addListener('click', () => openTransitSheet(c1, fromItem.name, c2, toItem.name, fromItem.date, fromItem.time));
          }
          overlays.push(labelMarker);
        }
      }

      if (dayItemsWC.length) {
        dayOverlayGroups.push(overlays);
        dayLatLngsList.push(dayItemsWC.map(x => new google.maps.LatLng(x.coords[0], x.coords[1])));
        dayMeta.push({ color, label: fmtDate(date) });
        _mapOverlays.push(...overlays);
      }
    }

    if (allLatLngs.length) {
      const bounds = new google.maps.LatLngBounds();
      allLatLngs.forEach(ll => bounds.extend(ll));
      mapInstance.fitBounds(bounds, { padding: 50 });
    } else {
      mapInstance.setCenter({ lat: 33.59, lng: 130.40 });
      mapInstance.setZoom(12);
      container.insertAdjacentHTML('beforeend',
        '<div style="position:absolute;top:12px;left:50%;transform:translateX(-50%);background:#fff;padding:8px 14px;border-radius:20px;font-size:12px;color:#888;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.15);">找不到景點座標，請填入 Google Maps 連結</div>'
      );
    }

    if (dayMeta.length > 1) {
      const chipsHTML = `<button class="day-chip" data-index="-1" style="color:#444;">全部</button>` +
        dayMeta.map((m, i) => `<button class="day-chip" data-index="${i}" style="color:${m.color};"><span style="width:8px;height:8px;border-radius:50%;background:${m.color};display:inline-block;flex-shrink:0;"></span>${m.label}</button>`).join('');
      container.insertAdjacentHTML('beforeend', `<div class="day-filter-bar">${chipsHTML}</div>`);

      function selectDay(idx) {
        container.querySelectorAll('.day-chip').forEach(c => {
          const ci = parseInt(c.dataset.index);
          c.classList.remove('active'); c.style.background = ''; c.style.color = ci === -1 ? '#444' : dayMeta[ci]?.color;
        });
        const active = container.querySelector(`.day-chip[data-index="${idx}"]`);
        if (active) { active.classList.add('active'); active.style.background = idx === -1 ? '#444' : dayMeta[idx].color; active.style.color = '#fff'; }
        dayOverlayGroups.forEach((ovs, i) => { const show = idx === -1 || i === idx; ovs.forEach(o => { if (o.setMap) o.setMap(show ? mapInstance : null); }); });
        const lls = idx === -1 ? allLatLngs : dayLatLngsList[idx];
        if (lls.length) { const b = new google.maps.LatLngBounds(); lls.forEach(ll => b.extend(ll)); mapInstance.fitBounds(b, { padding: 50 }); }
        // sync bottom strip visibility
        container.querySelectorAll('.map-spot-card').forEach(c => {
          const di = parseInt(c.dataset.dayIndex);
          c.style.display = (idx === -1 || di === idx) ? '' : 'none';
        });
        container.querySelectorAll('.map-spot-card').forEach(c => c.classList.remove('active'));
      }

      container.querySelectorAll('.day-chip').forEach(chip => {
        chip.addEventListener('click', () => selectDay(parseInt(chip.dataset.index)));
      });

      // Default: show first day only
      selectDay(0);
    } else if (dayMeta.length === 1) {
      container.insertAdjacentHTML('beforeend',
        `<div class="map-legend"><div class="legend-row"><div class="legend-dot" style="background:${dayMeta[0].color}"></div><span>${dayMeta[0].label}</span></div></div>`
      );
    }

    // ── Bottom spot card strip ──────────────────────────────────────
    if (allPlaceMarkers.length) {
      const stripHTML = allPlaceMarkers.map(({ item, dayIndex, cardId, color }) => {
        const seq = dayIndex + 1;
        const badge = `<span style="width:20px;height:20px;border-radius:50%;background:${color};color:#fff;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">${seq}</span>`;
        return `<div class="map-spot-card" id="${cardId}" data-day-index="${dayIndex}">
          ${badge}
          <div class="map-spot-card-body">
            <div class="map-spot-card-name">${item.name}</div>
            <div class="map-spot-card-meta">${item.time ? item.time + ' · ' : ''}${item.type || ''}</div>
          </div>
        </div>`;
      }).join('');
      container.insertAdjacentHTML('beforeend', `<div class="map-spot-strip" id="map-spot-strip">${stripHTML}</div>`);

      allPlaceMarkers.forEach(({ marker, infoWindow, cardId }) => {
        document.getElementById(cardId)?.addEventListener('click', () => {
          mapInstance.panTo(marker.getPosition());
          infoWindow.open(mapInstance, marker);
          document.querySelectorAll('.map-spot-card').forEach(c => c.classList.remove('active'));
          document.getElementById(cardId)?.classList.add('active');
        });
      });
    }

    _mapLoading = false;
  }

  /* ── TRANSIT SHEET ─────────────────────────────────────────────────── */
  function closeTransitSheet() {
    bsTransitSheet().hide();
  }

  function parseRoutesAPISteps(legs) {
    const steps = [];
    let firstDep = '', lastArr = '';
    for (const step of (legs?.[0]?.steps || [])) {
      if (step.travelMode === 'TRANSIT') {
        const td = step.transitDetails || {};
        const line = td.transitLine || {};
        const stop = td.stopDetails || {};
        const depText = td.localizedValues?.departureTime?.time?.text || '';
        const arrText = td.localizedValues?.arrivalTime?.time?.text || '';
        if (!firstDep) firstDep = depText;
        lastArr = arrText;
        steps.push({
          mode: 'TRANSIT',
          line: line.name || '',
          short_name: line.nameShort || '',
          headsign: td.headsign || '',
          departure_stop: stop.departureStop?.name || '',
          arrival_stop: stop.arrivalStop?.name || '',
          departure_time: depText,
          arrival_time: arrText,
          num_stops: td.stopCount || 0,
          vehicle: line.vehicle?.type || '',
          color: line.color || '',
          text_color: line.textColor || '',
        });
      } else if (step.travelMode === 'WALK') {
        steps.push({
          mode: 'WALKING',
          duration: step.localizedValues?.duration?.text || '',
          distance: step.localizedValues?.distance?.text || '',
        });
      }
    }
    return { steps, firstDep, lastArr };
  }

  async function openTransitSheet(fromCoords, fromLabel, toCoords, toLabel, date, time) {
    document.getElementById('transit-subtitle').textContent = `${fromLabel} → ${toLabel}`;
    document.getElementById('transit-routes').innerHTML = '<div class="spinner"></div>';
    bsTransitSheet().show();
    try {
      const fiveDaysMs = 5 * 24 * 60 * 60 * 1000;
      const tripDate = date ? new Date(date + 'T00:00:00') : null;
      const useActual = tripDate && tripDate > new Date() && (tripDate - new Date()) < fiveDaysMs;
      let baseTime;
      if (useActual && time) {
        baseTime = new Date(`${date}T${time}:00+09:00`);
      } else {
        baseTime = tomorrow9amDate();
      }

      const routes = [];
      const seen = new Set();

      // Routes API: 3 calls × alternatives=true (up to 3 each) = up to 9 options
      for (let attempt = 0; attempt < 3 && routes.length < 5; attempt++) {
        const depTime = new Date(baseTime.getTime() + attempt * 20 * 60 * 1000);
        const apiRoutes = await callRoutesAPI(fromCoords, toCoords, {
          mode: 'TRANSIT', alternatives: true, departureTime: depTime,
          fieldMask: 'routes.duration,routes.legs,routes.travelAdvisory.transitFare',
        });
        if (!apiRoutes) break;

        for (const apiRoute of apiRoutes) {
          const { steps, firstDep, lastArr } = parseRoutesAPISteps(apiRoute.legs);
          if (!steps.some(s => s.mode === 'TRANSIT')) continue;
          if (seen.has(firstDep)) continue;
          seen.add(firstDep);

          const durSec = parseInt(apiRoute.duration) || 0;
          const durText = apiRoute.legs?.[0]?.localizedValues?.duration?.text
            || (durSec ? `${Math.round(durSec / 60)} 分鐘` : '');

          let fareText = '';
          const tf = apiRoute.travelAdvisory?.transitFare;
          if (tf) fareText = `${tf.currencyCode} ${tf.units || ''}`;

          routes.push({ departure: firstDep, arrival: lastArr, duration: durText, fare: fareText, steps });
          if (routes.length >= 5) break;
        }
      }
      renderTransitRoutes(routes, routes.length === 0 ? 'ZERO_RESULTS' : '', fromCoords, toCoords);
    } catch(e) {
      document.getElementById('transit-routes').innerHTML = `<div class="transit-error">查詢失敗：${e.message}</div>`;
    }
  }

  function vehicleEmoji(type) {
    const map = {
      SUBWAY: '🚇', RAIL: '🚃', BUS: '🚌', TRAM: '🚃',
      FERRY: '⛴️', HEAVY_RAIL: '🚃', COMMUTER_TRAIN: '🚃',
      HIGH_SPEED_TRAIN: '🚅', INTERCITY_BUS: '🚌',
    };
    return map[type] || '🚌';
  }

  function renderTransitRoutes(routes, apiError, fromCoords, toCoords) {
    const el = document.getElementById('transit-routes');
    if (!routes || !routes.length) {
      const gmLink = (fromCoords && toCoords)
        ? `https://www.google.com/maps/dir/?api=1&origin=${fromCoords[0]},${fromCoords[1]}&destination=${toCoords[0]},${toCoords[1]}&travelmode=transit`
        : null;
      const linkHtml = gmLink
        ? `<br><a href="${gmLink}" target="_blank" style="color:var(--primary);text-decoration:none;font-size:13px;">在 Google Maps 開啟路線 →</a>`
        : '';
      el.innerHTML = `<div class="transit-empty">此路段查無大眾運輸班次${linkHtml}</div>`;
      return;
    }
    el.innerHTML = routes.map(r => {
      const timeLine = (r.departure || r.arrival)
        ? `<div class="transit-times">${r.departure} → ${r.arrival}</div>`
        : '';
      const fareLine = r.fare ? `<div class="transit-fare">${r.fare}</div>` : '';

      const stepsHtml = r.steps.length === 0
        ? '<div style="font-size:12px;color:var(--muted);padding:6px 0;">（無詳細班次資料）</div>'
        : r.steps.map(s => {
            if (s.mode === 'WALKING') {
              return `<div class="transit-step">
                <div class="transit-step-icon" style="background:#888;">🚶</div>
                <div class="transit-step-info">
                  <div class="transit-step-line">步行</div>
                  <div style="font-size:12px;color:var(--muted);">${s.distance || ''} ${s.duration || ''}</div>
                </div>
              </div>`;
            }
            const iconStyle = s.color ? `style="background:${s.color};color:${s.text_color || '#fff'}"` : '';
            const headsign  = s.headsign ? `<div class="transit-step-headsign">往 ${s.headsign}</div>` : '';
            const stops     = s.num_stops ? `<div class="transit-step-stops">${s.num_stops} 站</div>` : '';
            return `<div class="transit-step">
              <div class="transit-step-icon" ${iconStyle}>${vehicleEmoji(s.vehicle)}</div>
              <div class="transit-step-info">
                <div class="transit-step-line">${s.short_name || s.line}</div>
                ${headsign}
                <div style="font-size:12px;color:var(--text);margin-top:2px;">
                  <span style="font-weight:600;">${s.departure_stop}</span>
                  <span style="color:var(--muted);"> ${s.departure_time}</span>
                  &rarr;
                  <span style="font-weight:600;">${s.arrival_stop}</span>
                  <span style="color:var(--muted);"> ${s.arrival_time}</span>
                </div>
                ${stops}
              </div>
            </div>`;
          }).join('');

      return `<div class="transit-route-card">
        <div class="transit-route-header">
          <div class="transit-time-block">${timeLine}${fareLine}</div>
          <div class="transit-duration-badge">${r.duration}</div>
        </div>
        <div>${stepsHtml}</div>
      </div>`;
    }).join('');
  }

  /* ── NAV & VIEW SWITCHING ───────────────────────────────────────────── */
  function switchView(view) {
    currentView = view;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.view === view);
    });

    const fab = document.getElementById('fab');
    fab.style.display = (view === 'map' || view === 'checklist') ? 'none' : 'block';

    if (view === 'itinerary') loadItinerary();
    else if (view === 'expenses') loadExpenses();
    else if (view === 'checklist') loadChecklist();
    else if (view === 'map') loadMapView();
  }

  /* ── EVENT WIRING ───────────────────────────────────────────────────── */
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });

  document.getElementById('trip-selector').addEventListener('change', e => {
    currentTripId = e.target.value;
    if (currentView === 'itinerary') loadItinerary();
    else if (currentView === 'expenses') loadExpenses();
  });

  document.getElementById('fab').addEventListener('click', () => {
    if (currentView === 'itinerary') openAddModal();
    else if (currentView === 'expenses') openExpenseModal();
    else if (currentView === 'trips') openTripModal();
  });

  // Trips view add button
  document.getElementById('trips-content').addEventListener('click', e => {
    if (e.target.closest('#add-trip-btn')) openTripModal();
  });

  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('trip-modal-close').addEventListener('click', closeTripModal);
  document.getElementById('expense-modal-close').addEventListener('click', closeExpenseModal);
  document.getElementById('expense-save-btn').addEventListener('click', saveExpense);

  // Close modals on overlay click
  // Bootstrap Offcanvas handles backdrop click automatically
  document.getElementById('transit-close-btn').addEventListener('click', closeTransitSheet);

  /* ── INIT ───────────────────────────────────────────────────────────── */
  (async () => {
    await loadTrips();
    await loadItinerary();
    // Pre-load Maps API (with places library) so autocomplete is ready on first add
    try {
      const cfg = await apiFetch('/config');
      if (cfg.maps_key) {
        _mapsApiKey = cfg.maps_key;
        await loadGoogleMapsAPI(cfg.maps_key);
      }
    } catch(e) {}
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
